{% extends "templates/web.html" %}
{% block title %}精益管理{% endblock %}
{% block page_content %}
<body class="kaizen-page">
<link rel="stylesheet" href="/assets/kaizen/css/kaizen.css">

<!-- 顶部导航 -->
<div class="kz-navbar">
  <span class="kz-navbar-back" onclick="history.back()">‹ 返回</span>
  <span class="kz-navbar-title">精益管理</span>
  <span style="width:48px"></span>
</div>

<div style="padding: 12px 16px;" id="kz-home-content">
  <div class="kz-loading"><div class="kz-spinner"></div><div>加载中...</div></div>
</div>

<script src="/assets/kaizen/js/kaizen.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(async function() {
  const container = document.getElementById('kz-home-content');
  try {
    const stats = await KaizenUtils.call('kaizen.kaizen.api.kaizen_api.get_home_stats');
    container.innerHTML = renderHome(stats);
    initChart(stats);
    bindMenuEvents();
  } catch(e) {
    container.innerHTML = '<div class="kz-empty"><div class="kz-empty-icon">⚠️</div><div>加载失败，请刷新重试</div></div>';
  }
})();

function renderHome(stats) {
  return `
    <!-- 折线图 -->
    <div class="kz-chart-wrap">
      <div class="kz-chart-title">近三个月改善动态</div>
      <canvas id="kz-trend-chart" height="160"></canvas>
    </div>

    <!-- 统计卡片 -->
    <div class="kz-stat-grid">
      <div class="kz-stat-card" onclick="KaizenUtils.goto('/kaizen-proposal')">
        <div class="kz-stat-num">${stats.my_proposals || 0}</div>
        <div class="kz-stat-label">我的提案</div>
      </div>
      <div class="kz-stat-card" style="border-left:3px solid #ff7875;" onclick="KaizenUtils.goto('/kaizen-review')">
        <div class="kz-stat-num" style="color:#ff4d4f;">${stats.pending_total || 0}</div>
        <div class="kz-stat-label">待我处理</div>
      </div>
    </div>

    <!-- 改善提案 -->
    <div class="kz-section-header">改善提案</div>
    <div class="kz-menu-grid" style="grid-template-columns: repeat(1,1fr); padding:0;">
      <div class="kz-item-card" onclick="KaizenUtils.goto('/kaizen-proposal')" style="display:flex;align-items:center;gap:12px;">
        <div class="kz-menu-icon" style="background:#e6f0ff; min-width:48px;">💡</div>
        <div>
          <div style="font-weight:600;">改善提案</div>
          <div style="font-size:12px;color:#999;">提交您的改善建议</div>
        </div>
        <span style="margin-left:auto;color:#ccc;">›</span>
      </div>
    </div>

    <!-- 精益推进 -->
    <div class="kz-section-header">精益推进</div>
    <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:12px;">
      ${renderMenuRow('📋', '#fff0f6', '提案审核', '审核员工提案', '/kaizen-review', stats.pending_review)}
      ${renderMenuRow('📝', '#f0f5ff', '改善方案编制', '制定改善方案', '/kaizen-plan/list', stats.pending_plan)}
      ${renderMenuRow('🔧', '#f6ffed', '改善实施', '记录实施过程', '/kaizen-implement/list', stats.pending_implement)}
      ${renderMenuRow('⭐', '#fffbe6', '改善评价', '评价实施效果', '/kaizen-evaluate', stats.pending_evaluate)}
    </div>

    <!-- 精益报表 -->
    <div class="kz-section-header">精益报表</div>
    <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:12px;">
      ${renderMenuRow('📊', '#f9f0ff', '我的改善', '查看个人改善记录', '/kaizen-report', 0)}
    </div>

    <!-- 精益课堂 -->
    <div class="kz-section-header">精益课堂</div>
    <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:24px;">
      ${renderMenuRow('📚', '#e6fffb', '精益学习', '学习精益知识', '/kaizen-learning', 0)}
      ${renderMenuRow('🏆', '#fff7e6', '优秀提案', '查看优秀案例', '/kaizen-learning?category=优秀案例', 0)}
    </div>
  `;
}

function renderMenuRow(icon, bg, title, sub, href, badge) {
  return `
    <div class="kz-item-card" onclick="KaizenUtils.goto('${href}')" style="border-radius:0;margin:0;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f0f0f0;">
      <div class="kz-menu-icon" style="background:${bg}; min-width:48px;">${icon}</div>
      <div style="flex:1;">
        <div style="font-weight:600;">${title}</div>
        <div style="font-size:12px;color:#999;">${sub}</div>
      </div>
      ${badge > 0 ? `<span style="background:#ff4d4f;color:#fff;border-radius:10px;padding:2px 8px;font-size:12px;font-weight:600;">${badge}</span>` : ''}
      <span style="color:#ccc;">›</span>
    </div>
  `;
}

function initChart(stats) {
  const ctx = document.getElementById('kz-trend-chart');
  if (!ctx || !stats.chart_data) return;

  // 整理月份和数据
  const months = [...new Set(stats.chart_data.map(d => d.month))].sort();
  const statusList = ['待提交','已提交','已立项'];
  const colors = { '待提交': '#faad14', '已提交': '#1677ff', '已立项': '#52c41a' };

  const datasets = statusList.map(s => ({
    label: s,
    data: months.map(m => {
      const found = stats.chart_data.find(d => d.month === m && d.status === s);
      return found ? found.cnt : 0;
    }),
    borderColor: colors[s],
    backgroundColor: colors[s] + '22',
    tension: 0.4,
    fill: false,
  }));

  new Chart(ctx, {
    type: 'line',
    data: { labels: months, datasets },
    options: {
      responsive: true,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 } },
        x: { ticks: { font: { size: 11 } } }
      }
    }
  });
}

function bindMenuEvents() {}
</script>
</body>
{% endblock %}
