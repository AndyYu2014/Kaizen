{% extends "templates/web.html" %}
{% block title %}改善提案{% endblock %}
{% block page_content %}
<body class="kaizen-page">
<link rel="stylesheet" href="/assets/kaizen/css/kaizen.css">

<div class="kz-page-header">
  <div class="kz-page-title">改善提案</div>
  <div class="kz-header-actions">
    <button class="kz-btn kz-btn-primary kz-btn-sm" onclick="KaizenUtils.goto('/kaizen-proposal-new')">+ 新建</button>
  </div>
</div>

<div style="padding:12px 16px;">
  <div style="background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;flex-direction:column;gap:10px;">
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:space-between;">
      <div class="kz-view-tabs">
        <button class="kz-tab" data-filter="all" onclick="setFilter('all',this)">全部</button>
        <button class="kz-tab active" data-filter="active" onclick="setFilter('active',this)">进行中</button>
      </div>
      <div class="kz-view-tabs">
        <button class="kz-tab active" data-view="card" onclick="setView('card',this)">卡片视图</button>
        <button class="kz-tab" data-view="list" onclick="setView('list',this)">列表视图</button>
        <button class="kz-tab" data-view="gantt" onclick="setView('gantt',this)">甘特视图</button>
        <button class="kz-tab" data-view="calendar" onclick="setView('calendar',this)">日历视图</button>
      </div>
    </div>
  </div>
  <div id="proposal-list"><div class="kz-loading"><div class="kz-spinner"></div><div>加载中...</div></div></div>
</div>

<script src="/assets/kaizen/js/kaizen.js?v=20260226"></script>
<script>
let currentFilter = 'active';
let currentView = 'card';

async function loadList(retried = false) {
  const list = document.getElementById('proposal-list');
  KaizenUtils.showLoading(list);
  try {
    const include_closed = currentFilter === 'all' ? 1 : 0;
    let data = await KaizenUtils.call('kaizen.kaizen.api.kaizen_api.get_my_proposals', { include_closed });
    if (!Array.isArray(data)) data = [];
    if (!data.length) {
      list.innerHTML = `<div class="kz-empty">
        <div class="kz-empty-icon">&#x1F4CB;</div>
        <div class="kz-empty-text">\u5f53\u524d\u6ca1\u6709\u63d0\u6848</div>
        <div style="margin-top:12px;">
          <button class="kz-btn kz-btn-primary kz-btn-sm" onclick="KaizenUtils.goto('/kaizen-proposal-new')">+ \u65b0\u5efa\u63d0\u6848</button>
        </div>
      </div>`;
      return;
    }
    list.innerHTML = data.map(p => renderProposalCard(p)).join('');
  } catch(e) {
    if (!retried) {
      return loadList(true);
    }
    KaizenUtils.showEmpty(list, '\u52a0\u8f7d\u5931\u8d25\uff0c\u8bf7\u5237\u65b0');
  }
}

function renderProposalCard(p) {
  const statusCls = KaizenUtils.statusClass(p.status);
  const projStatusCls = p.project_status ? KaizenUtils.statusClass(p.project_status) : '';
  return `
    <div class="kz-item-card" onclick="KaizenUtils.goto('/kaizen-proposal/'+encodeURIComponent(p.name))">
      <div class="kz-item-card-row1">
        <span class="kz-item-no">${p.name}</span>
        <span class="kz-tag ${statusCls}">${p.status}</span>
      </div>
      <div class="kz-item-card-row2">
        <span class="kz-tag kz-tag-type">${p.kaizen_type || '-'}</span>
        ${p.project_status ? `<span class="kz-tag ${projStatusCls}">${p.project_status}</span>` : ''}
      </div>
      <div style="font-size:13px;color:#666;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
        ${p.phenomenon ? p.phenomenon.substring(0,40) + (p.phenomenon.length > 40 ? '...' : '') : ''}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#999;">
        <span>${p.departments ? '责任部门：' + p.departments : ''}</span>
        <span>${KaizenUtils.formatDate(p.submitted_date || p.creation)}</span>
      </div>
      ${p.kaizen_project ? `<div style="font-size:12px;color:#1677ff;margin-top:4px;">改善项目：${p.kaizen_project}</div>` : ''}
    </div>
  `;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadList();
}

function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (view !== 'card') {
    KaizenUtils.toast('该视图暂未开放');
  }
}

loadList();
</script>
</body>
{% endblock %}
