{% extends "templates/web.html" %}
{% block title %}我的改善报表{% endblock %}
{% block page_content %}
<body class="kaizen-page">
<link rel="stylesheet" href="/assets/kaizen/css/kaizen.css">
<div class="kz-navbar">
  <span class="kz-navbar-back" onclick="KaizenUtils.goto('/kaizen-home')">‹ 精益</span>
  <span class="kz-navbar-title">我的改善</span>
  <span style="width:48px"></span>
</div>
<div style="padding:12px 16px;" id="report-content">
  <div class="kz-loading"><div class="kz-spinner"></div><div>加载中...</div></div>
</div>
<script src="/assets/kaizen/js/kaizen.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
async function loadReport() {
  const container = document.getElementById('report-content');
  try {
    const [myData, deptData, typeData] = await Promise.all([
      KaizenUtils.call('kaizen.kaizen.api.kaizen_api.get_my_improvement_report'),
      KaizenUtils.call('kaizen.kaizen.api.kaizen_api.get_department_stats'),
      KaizenUtils.call('kaizen.kaizen.api.kaizen_api.get_type_analysis'),
    ]);

    // 统计汇总
    const total = myData.length;
    const approved = myData.filter(d => d.project_name).length;
    const closed = myData.filter(d => d.project_status === '已关闭').length;
    const avgStar = myData.filter(d => d.star_rating > 0).reduce((s, d) => s + d.star_rating, 0)
                  / (myData.filter(d => d.star_rating > 0).length || 1);

    container.innerHTML = `
      <!-- 汇总统计 -->
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;">
        ${statCard('提案总数', total, '#1677ff')}
        ${statCard('已立项', approved, '#52c41a')}
        ${statCard('已关闭', closed, '#722ed1')}
        ${statCard('平均星级', avgStar.toFixed(1) + '★', '#faad14')}
      </div>

      <!-- 类型分布图 -->
      ${typeData && typeData.length ? `
      <div class="kz-chart-wrap">
        <div class="kz-chart-title">📊 类型分布</div>
        <canvas id="type-chart" height="200"></canvas>
      </div>` : ''}

      <!-- 我的提案明细 -->
      <div class="kz-card">
        <div class="kz-chart-title">📋 提案明细</div>
        <div style="overflow-x:auto;">
          <table class="kz-report-table">
            <thead><tr>
              <th>提案编号</th><th>类型</th><th>提案状态</th><th>项目编号</th><th>项目状态</th><th>评星</th>
            </tr></thead>
            <tbody>
              ${myData.map(d => `<tr>
                <td style="white-space:nowrap;color:#1677ff;">${d.proposal_name}</td>
                <td>${d.kaizen_type || '-'}</td>
                <td><span class="kz-tag ${KaizenUtils.statusClass(d.proposal_status)}">${d.proposal_status}</span></td>
                <td style="color:#1677ff;">${d.project_name || '-'}</td>
                <td>${d.project_status ? `<span class="kz-tag ${KaizenUtils.statusClass(d.project_status)}">${d.project_status}</span>` : '-'}</td>
                <td>${d.star_rating ? '★'.repeat(d.star_rating) : '-'}</td>
              </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:#999;">暂无数据</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>

      <!-- 部门统计 -->
      ${deptData && deptData.length ? `
      <div class="kz-card" style="margin-top:12px;">
        <div class="kz-chart-title">🏢 部门统计</div>
        <table class="kz-report-table">
          <thead><tr><th>部门</th><th>总项目</th><th>已关闭</th><th>平均星级</th></tr></thead>
          <tbody>
            ${deptData.map(d => `<tr>
              <td>${d.department}</td>
              <td>${d.total_projects}</td>
              <td>${d.closed_projects}</td>
              <td>${d.avg_rating ? parseFloat(d.avg_rating).toFixed(1) + '★' : '-'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>` : ''}
    `;

    // 初始化图表
    if (typeData && typeData.length) {
      new Chart(document.getElementById('type-chart'), {
        type: 'doughnut',
        data: {
          labels: typeData.map(d => d.kaizen_type || '未分类'),
          datasets: [{
            data: typeData.map(d => d.proposal_count),
            backgroundColor: ['#1677ff','#52c41a','#faad14','#ff4d4f','#722ed1','#13c2c2'],
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
        }
      });
    }
  } catch(e) {
    container.innerHTML = '<div class="kz-empty">⚠️ 加载失败，请刷新重试</div>';
  }
}

function statCard(label, value, color) {
  return `<div style="background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
    <div style="font-size:26px;font-weight:700;color:${color};">${value}</div>
    <div style="font-size:12px;color:#999;margin-top:4px;">${label}</div>
  </div>`;
}

loadReport();
</script>
</body>
{% endblock %}
