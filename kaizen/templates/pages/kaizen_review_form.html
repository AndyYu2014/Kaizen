{% extends "templates/web.html" %}
{% block title %}审核提案{% endblock %}
{% block page_content %}
<body class="kaizen-page">
<link rel="stylesheet" href="/assets/kaizen/css/kaizen.css">

<div class="kz-navbar" style="gap:8px;">
  <span class="kz-navbar-back" onclick="history.back()">&#x2039; 返回</span>
  <span class="kz-navbar-title">提案审核</span>
  <span style="width:48px"></span>
</div>

<div style="padding:12px 16px 120px;" id="review-form-content">
  <div class="kz-loading"><div class="kz-spinner"></div><div>加载中...</div></div>
</div>
<div style="position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;border-top:1px solid #e8e8e8;display:flex;gap:10px;">
  <button class="kz-btn kz-btn-sm" onclick="returnProposal()" style="flex:0.6;background:#f0f0f0;color:#666;border:1px solid #d9d9d9;">退回</button>
  <button class="kz-btn kz-btn-danger kz-btn-sm" onclick="rejectProposal()" style="flex:0.6;">拒绝</button>
  <button class="kz-btn kz-btn-primary kz-btn-sm" onclick="approveProposal()" style="flex:1;">通过</button>
</div>
<script src="/assets/kaizen/js/kaizen.js"></script>
<script>
const urlParts = window.location.pathname.split('/');
const proposalName = decodeURIComponent(urlParts[urlParts.length - 1]);

async function init() {
  const container = document.getElementById('review-form-content');
  try {
    let d = null;
    // 先尝试从待审核列表获取（避免frappe.client权限问题）
    try {
      const proposals = await KaizenUtils.call('kaizen.kaizen.api.kaizen_api.get_pending_review_proposals');
      if (proposals && proposals.length) {
        d = proposals.find(function(p){ return p.name === proposalName; });
      }
    } catch(e1) {}
    // 若列表中没找到，尝试直接get
    if (!d) {
      d = await KaizenUtils.call('frappe.client.get', { doctype: 'Kaizen Proposal', name: proposalName });
    }
    if (!d) {
      container.innerHTML = '<div class="kz-empty">找不到提案：' + proposalName + '</div>';
      return;
    }
    container.innerHTML = renderReviewForm(d);
  } catch(e) {
    container.innerHTML = '<div class="kz-empty">加载失败：' + (e.message||'') + '</div>';
  }
}

function renderReviewForm(d) {
  return '<div class="kz-form-section">' +
    '<div class="kz-form-section-title">提案信息</div>' +
    '<div class="kz-form-item"><div class="kz-form-label">提案编号</div><div>' + d.name + '</div></div>' +
    '<div class="kz-form-item"><div class="kz-form-label">精益类型</div><div>' + (d.kaizen_type || '-') + '</div></div>' +
    '<div class="kz-form-item"><div class="kz-form-label">提交人</div><div>' + (d.submitted_by || '-') + '</div></div>' +
    '<div class="kz-form-item" style="flex-direction:column;">' +
      '<div class="kz-form-label" style="margin-bottom:6px;">提案标题/待改善现象</div>' +
      '<div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:14px;">' + (d.phenomenon || '-') + '</div>' +
    '</div>' +
    (d.suggestion ? '<div class="kz-form-item" style="flex-direction:column;"><div class="kz-form-label" style="margin-bottom:6px;">改善建议</div><div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:14px;">' + d.suggestion + '</div></div>' : '') +
  '</div>' +
  '<div class="kz-form-section">' +
    '<div class="kz-form-section-title">审核评估</div>' +
    '<div class=kz-form-item><div class=kz-form-label>改善编号(模板)</div><div class=kz-form-control><input class=kz-input type=text readonly placeholder=改善-YYYYMM- value=></div></div>' +
    '<div class=kz-form-item><div class=kz-form-label>改善状态</div><div>方案编制中</div></div>' +
    '<div class="kz-form-item"><div class="kz-form-label required">紧迫性</div><div class="kz-form-control"><select id="r-urgency" class="kz-select"><option value="">请选择</option><option value="低">低</option><option value="中">中</option><option value="高">高</option></select></div></div>' +
    '<div class="kz-form-item"><div class="kz-form-label required">经济性</div><div class="kz-form-control"><select id="r-economic" class="kz-select"><option value="">请选择</option><option value="低">低</option><option value="中">中</option><option value="高">高</option></select></div></div>' +
    '<div class="kz-form-item"><div class="kz-form-label required">质量影响</div><div class="kz-form-control"><select id="r-quality" class="kz-select"><option value="">请选择</option><option value="低">低</option><option value="中">中</option><option value="高">高</option></select></div></div>' +
    '<div class="kz-form-item" style="flex-direction:column;"><div class="kz-form-label" style="margin-bottom:6px;">预期改进目标</div><textarea id="r-target" class="kz-textarea" style="min-height:80px;" placeholder="例：节省人工2人/月，减少废品率5%"></textarea></div>' +
    '<div class="kz-form-item"><div class="kz-form-label">预期完成日期</div><div class="kz-form-control"><input id="r-date" class="kz-input" type="date"></div></div>' +
  '</div>' +
  '<div class="kz-form-section">' +
    '<div class="kz-form-section-title">指定实施部门</div>' +
    '<div id="dept-list"><div class="kz-form-item" style="flex-direction:column;gap:8px;"><input class="kz-input dept-input" type="text" placeholder="部门名称（如：生产部）"><input class="kz-input person-input" type="text" placeholder="负责人"></div></div>' +
    '<div style="padding:8px 16px;"><button class="kz-btn kz-btn-outline" onclick="addDeptRow()" style="width:auto;padding:8px 16px;font-size:13px;">+ 添加部门</button></div>' +
  '</div>' +
  '<div class="kz-form-section">' +
    '<div class="kz-form-section-title">审核意见</div>' +
    '<div class="kz-form-item" style="flex-direction:column;"><textarea id="r-comment" class="kz-textarea" placeholder="审核意见（可选）"></textarea></div>' +
  '</div>';
}

function addDeptRow() {
  var list = document.getElementById('dept-list');
  var div = document.createElement('div');
  div.className = 'kz-form-item';
  div.style.cssText = 'flex-direction:column;gap:8px;margin-top:8px;';
  div.innerHTML = '<input class="kz-input dept-input" type="text" placeholder="部门名称"><input class="kz-input person-input" type="text" placeholder="负责人">';
  list.appendChild(div);
}

async function approveProposal() {
  var urgency = document.getElementById('r-urgency').value;
  var economic = document.getElementById('r-economic').value;
  var quality = document.getElementById('r-quality').value;
  if (!urgency || !economic || !quality) { KaizenUtils.toast('请完整填写评估维度'); return; }
  var depts = [];
  var deptInputs = document.querySelectorAll('.dept-input');
  var personInputs = document.querySelectorAll('.person-input');
  deptInputs.forEach(function(inp, i) {
    if (inp.value.trim()) depts.push({ department: inp.value.trim(), responsible_person: personInputs[i] ? personInputs[i].value.trim() : '' });
  });
  var data = {
    proposal_name: proposalName,
    urgency: urgency, economic_value: economic, quality_impact: quality,
    improvement_target: document.getElementById('r-target').value || '',
    expected_completion_date: document.getElementById('r-date').value || '',
    review_comment: document.getElementById('r-comment').value || '',
    departments: depts,
  };
  try {
    const resp = await KaizenUtils.call('kaizen.kaizen.api.kaizen_api.approve_proposal', { data: JSON.stringify(data) });
    KaizenUtils.toast('审核通过，生成改善：' + (resp.project_name ? resp.project_name : ''));
    setTimeout(function(){ KaizenUtils.goto('/kaizen-review'); }, 1200);
  } catch(e) { KaizenUtils.toast('操作失败：' + (e.message||'')); }
}

async function rejectProposal() {
  var reason = prompt('请输入拒绝原因：');
  if (reason === null) return;
  try {
    await KaizenUtils.call('kaizen.kaizen.api.kaizen_api.reject_proposal', { proposal_name: proposalName, reason: reason });
    KaizenUtils.toast('已拒绝');
    setTimeout(function(){ KaizenUtils.goto('/kaizen-review'); }, 1200);
  } catch(e) { KaizenUtils.toast('操作失败'); }
}

async function returnProposal() {
  var reason = prompt('请输入退回原因：');
  if (reason === null) return;
  try {
    await KaizenUtils.call('kaizen.kaizen.api.kaizen_api.return_proposal', { proposal_name: proposalName, reason: reason });
    KaizenUtils.toast('已退回');
    setTimeout(function(){ KaizenUtils.goto('/kaizen-review'); }, 1200);
  } catch(e) { KaizenUtils.toast('操作失败'); }
}

init();
</script>
</body>
{% endblock %}
