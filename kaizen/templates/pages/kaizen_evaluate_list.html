{% extends "templates/web.html" %}
{% block title %}改善评价{% endblock %}
{% block page_content %}
<body class="kaizen-page">
<link rel="stylesheet" href="/assets/kaizen/css/kaizen.css">
<div class="kz-navbar">
  <span class="kz-navbar-back" onclick="KaizenUtils.goto('/kaizen-home')">‹ 精益</span>
  <span class="kz-navbar-title">改善评价</span>
  <span style="width:48px"></span>
</div>
<div style="padding:12px 16px;" id="eval-list">
  <div class="kz-loading"><div class="kz-spinner"></div><div>加载中...</div></div>
</div>
<script src="/assets/kaizen/js/kaizen.js"></script>
<script>
async function loadList() {
  const list = document.getElementById('eval-list');
  try {
    const data = await KaizenUtils.call('kaizen.kaizen.api.kaizen_api.get_pending_evaluate_projects');
    if (!data || !data.length) {
      list.innerHTML = `<div class="kz-empty"><div class="kz-empty-icon">✅</div><div>暂无待评价项目</div></div>`;
      return;
    }
    list.innerHTML = data.map(p => `
      <div class="kz-item-card" onclick="KaizenUtils.goto('/kaizen-evaluate/${p.name}')">
        <div class="kz-item-card-row1">
          <span class="kz-item-no">${p.name}</span>
          <span class="kz-tag kz-tag-status-evaluating">待评价</span>
        </div>
        <div style="font-size:14px;font-weight:600;margin-bottom:4px;">${p.title || '-'}</div>
        <div style="font-size:13px;color:#666;margin-bottom:4px;">
          ${p.implementation_result ? p.implementation_result.substring(0,60) + '...' : ''}
        </div>
        <div style="font-size:12px;color:#999;">完成时间：${KaizenUtils.formatDate(p.actual_end_date)}</div>
      </div>
    `).join('');
  } catch(e) { KaizenUtils.showEmpty(list, '加载失败'); }
}
loadList();
</script>
</body>
{% endblock %}
