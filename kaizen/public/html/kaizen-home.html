---
no_cache: 1
---

{% extends "templates/web.html" %}

{% block title %}精益管理{% endblock %}

{% block page_content %}
<div class="kz-page" id="kz-home">

  <!-- 顶栏 -->
  <div class="kz-header">
    <a href="/app" class="back-btn">‹</a>
    <span class="title">精益管理</span>
  </div>

  <div class="kz-content">

    <!-- 快速访问折线图 -->
    <div class="kz-card">
      <div class="kz-card-title">📈 改善趋势（近3个月）</div>
      <div class="kz-chart-wrap">
        <canvas id="trend-chart" style="width:100%;height:180px;"></canvas>
      </div>
    </div>

    <!-- 统计数字 -->
    <div class="kz-stat-grid">
      <div class="kz-stat-card">
        <div class="label">我的提案</div>
        <div class="value" id="stat-my-proposals">-</div>
      </div>
      <div class="kz-stat-card warning">
        <div class="label">待处理事项</div>
        <div class="value" id="stat-pending">-</div>
      </div>
      <div class="kz-stat-card success">
        <div class="label">我的改善项目</div>
        <div class="value" id="stat-my-projects">-</div>
      </div>
      <div class="kz-stat-card">
        <div class="label">本月提案</div>
        <div class="value" id="stat-month">-</div>
      </div>
    </div>

    <!-- 改善提案 -->
    <div class="kz-card">
      <div class="kz-card-title">📝 改善提案</div>
      <div class="kz-menu-grid">
        <a href="/kaizen-proposal-list" class="kz-menu-item">
          <div class="icon blue">📋</div>
          <span class="name">改善提案</span>
        </a>
      </div>
    </div>

    <!-- 精益推进 -->
    <div class="kz-card">
      <div class="kz-card-title">🚀 精益推进</div>
      <div class="kz-menu-grid">
        <a href="/kaizen-review-list" class="kz-menu-item">
          <div class="icon orange">🔍</div>
          <span class="name">提案审核</span>
        </a>
        <a href="/kaizen-plan-list" class="kz-menu-item">
          <div class="icon purple">📐</div>
          <span class="name">方案编制</span>
        </a>
        <a href="/kaizen-implement-list" class="kz-menu-item">
          <div class="icon green">🔧</div>
          <span class="name">改善实施</span>
        </a>
        <a href="/kaizen-evaluate-list" class="kz-menu-item">
          <div class="icon teal">⭐</div>
          <span class="name">改善评价</span>
        </a>
      </div>
    </div>

    <!-- 精益报表 -->
    <div class="kz-card">
      <div class="kz-card-title">📊 精益报表</div>
      <div class="kz-menu-grid">
        <a href="/kaizen-report?type=my" class="kz-menu-item">
          <div class="icon blue">📈</div>
          <span class="name">我的改善</span>
        </a>
        <a href="/kaizen-report?type=dept" class="kz-menu-item">
          <div class="icon orange">🏢</div>
          <span class="name">部门统计</span>
        </a>
        <a href="/kaizen-report?type=board" class="kz-menu-item">
          <div class="icon green">📋</div>
          <span class="name">进度看板</span>
        </a>
        <a href="/kaizen-report?type=excellent" class="kz-menu-item">
          <div class="icon purple">🏆</div>
          <span class="name">优秀改善</span>
        </a>
      </div>
    </div>

    <!-- 精益课堂 -->
    <div class="kz-card">
      <div class="kz-card-title">📚 精益小课堂</div>
      <div class="kz-menu-grid">
        <a href="/kaizen-learning" class="kz-menu-item">
          <div class="icon teal">📖</div>
          <span class="name">精益学习</span>
        </a>
        <a href="/kaizen-learning?category=优秀案例" class="kz-menu-item">
          <div class="icon red">🏅</div>
          <span class="name">优秀提案</span>
        </a>
      </div>
    </div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  loadStats();
  loadTrend();
});

function loadStats() {
  KZ.api("kaizen.api.kaizen_api.get_home_stats").then(data => {
    document.getElementById("stat-my-proposals").textContent = data.my_proposals || 0;
    document.getElementById("stat-pending").textContent = data.pending || 0;
    document.getElementById("stat-my-projects").textContent = data.my_projects || 0;
  });
}

function loadTrend() {
  KZ.api("kaizen.api.kaizen_api.get_trend_data").then(data => {
    // 整理近3个月数据
    const months = getLast3Months();
    const proposalMap = {};
    const projectMap = {};

    (data.proposals || []).forEach(r => {
      proposalMap[r.month] = (proposalMap[r.month] || 0) + r.count;
    });
    (data.projects || []).forEach(r => {
      projectMap[r.month] = (projectMap[r.month] || 0) + r.count;
    });

    const labels = months.map(m => m.slice(5));
    const values = months.map(m => (proposalMap[m] || 0) + (projectMap[m] || 0));

    KZ.drawLineChart("trend-chart", values, labels);

    // 本月统计
    const thisMonth = months[months.length - 1];
    document.getElementById("stat-month").textContent =
      (proposalMap[thisMonth] || 0) + (projectMap[thisMonth] || 0);
  });
}

function getLast3Months() {
  const result = [];
  const now = new Date();
  for (let i = 2; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const m = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    result.push(m);
  }
  return result;
}
</script>
{% endblock %}
