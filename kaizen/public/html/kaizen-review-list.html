---
no_cache: 1
---

{% extends "templates/web.html" %}
{% block title %}提案审核{% endblock %}

{% block page_content %}
<div class="kz-page" id="kz-review">

  <!-- 列表视图 -->
  <div id="view-list">
    <div class="kz-header">
      <a href="/kaizen-home" class="back-btn">‹</a>
      <span class="title">提案审核</span>
    </div>
    <div class="kz-content">
      <div id="review-list-container"><div class="kz-loading">加载中...</div></div>
    </div>
  </div>

  <!-- 审核详情视图 -->
  <div id="view-detail" style="display:none;">
    <div class="kz-header">
      <a href="javascript:showList()" class="back-btn">‹</a>
      <span class="title">审核提案</span>
    </div>

    <div class="kz-content">
      <!-- 提案内容 -->
      <div class="kz-card">
        <div class="kz-card-title">📋 提案详情</div>
        <div id="proposal-info"></div>
      </div>

      <!-- 审核评分 -->
      <div class="kz-card">
        <div class="kz-card-title">📊 审核评估</div>

        <div class="kz-form-group">
          <label class="kz-form-label required">紧迫性</label>
          <div style="display:flex;gap:8px;">
            <button class="kz-radio-btn" data-field="urgency" data-value="低" onclick="selectOption(this)">低</button>
            <button class="kz-radio-btn" data-field="urgency" data-value="中" onclick="selectOption(this)">中</button>
            <button class="kz-radio-btn" data-field="urgency" data-value="高" onclick="selectOption(this)">高</button>
          </div>
        </div>

        <div class="kz-form-group">
          <label class="kz-form-label required">经济性</label>
          <div style="display:flex;gap:8px;">
            <button class="kz-radio-btn" data-field="economic_impact" data-value="低" onclick="selectOption(this)">低</button>
            <button class="kz-radio-btn" data-field="economic_impact" data-value="中" onclick="selectOption(this)">中</button>
            <button class="kz-radio-btn" data-field="economic_impact" data-value="高" onclick="selectOption(this)">高</button>
          </div>
        </div>

        <div class="kz-form-group">
          <label class="kz-form-label required">质量影响</label>
          <div style="display:flex;gap:8px;">
            <button class="kz-radio-btn" data-field="quality_impact" data-value="低" onclick="selectOption(this)">低</button>
            <button class="kz-radio-btn" data-field="quality_impact" data-value="中" onclick="selectOption(this)">中</button>
            <button class="kz-radio-btn" data-field="quality_impact" data-value="高" onclick="selectOption(this)">高</button>
          </div>
        </div>

        <div class="kz-form-group">
          <label class="kz-form-label">改善目标（人/物/财）</label>
          <textarea class="kz-textarea" id="improvement_goal" placeholder="请描述预期的改善目标..."></textarea>
        </div>
      </div>

      <!-- 负责人 -->
      <div class="kz-card">
        <div class="kz-card-title">👤 改善项目负责人</div>
        <div class="kz-form-group">
          <label class="kz-form-label">项目负责人</label>
          <select class="kz-select" id="project_leader">
            <option value="">请选择</option>
          </select>
        </div>
        <div class="kz-form-group">
          <label class="kz-form-label">预期完成日期</label>
          <input type="date" class="kz-input" id="expected_completion_date">
        </div>
      </div>

      <!-- 实施部门 -->
      <div class="kz-card">
        <div class="kz-card-title">🏢 实施部门</div>
        <div id="dept-list"></div>
        <button class="kz-btn kz-btn-outline" style="width:100%;margin-top:8px;" onclick="addDept()">+ 添加部门</button>
      </div>
    </div>

    <div class="kz-bottom-bar">
      <button class="kz-btn kz-btn-danger" onclick="rejectProposal()">拒绝</button>
      <button class="kz-btn kz-btn-primary" onclick="approveProposal()">通过并立项</button>
    </div>
  </div>

</div>

<style>
.kz-radio-btn {
  flex: 1;
  padding: 8px;
  border: 1.5px solid #e8e8e8;
  border-radius: 8px;
  background: #fff;
  font-size: 14px;
  cursor: pointer;
  color: #666;
  transition: all 0.2s;
}
.kz-radio-btn.active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}
.dept-row {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 8px;
  align-items: center;
  margin-bottom: 10px;
}
</style>

<script>
let currentProposal = null;
let departments = [];
let reviewValues = {};

document.addEventListener("DOMContentLoaded", function() {
  showList();
  loadUsers();
});

function showList() {
  document.getElementById("view-list").style.display = "";
  document.getElementById("view-detail").style.display = "none";

  KZ.api("kaizen.api.kaizen_api.get_proposals_for_review").then(data => {
    const container = document.getElementById("review-list-container");
    if (!data || !data.length) {
      KZ.showEmpty(container, "暂无待审核提案");
      return;
    }
    container.innerHTML = data.map(item => `
      <div class="kz-list-item" onclick="showDetail('${item.name}')">
        <div class="item-header">
          <span class="item-no">${item.name}</span>
          <span class="item-date">${KZ.formatDate(item.submitted_date)}</span>
        </div>
        <div class="item-desc">${item.phenomenon_description || ""}</div>
        <div class="item-footer">
          ${KZ.tag(item.status)}
          ${item.kaizen_type ? `<span class="kz-tag type">${item.kaizen_type}</span>` : ""}
          <span class="kz-tag type">👤 ${item.submitted_by}</span>
        </div>
      </div>
    `).join("");
  });
}

function showDetail(name) {
  frappe.call({ method: "frappe.client.get",
    args: { doctype: "Kaizen Proposal", name: name }
  }).then(r => {
    currentProposal = r.message;
    reviewValues = {};
    departments = [];

    document.getElementById("view-list").style.display = "none";
    document.getElementById("view-detail").style.display = "";

    document.getElementById("proposal-info").innerHTML = `
      <table style="width:100%;font-size:13px;line-height:2;">
        <tr><td style="color:#999;width:80px;">编号</td><td>${currentProposal.name}</td></tr>
        <tr><td style="color:#999;">类型</td><td>${currentProposal.kaizen_type || "-"}</td></tr>
        <tr><td style="color:#999;">提交人</td><td>${currentProposal.submitted_by || "-"}</td></tr>
        <tr><td style="color:#999;">提交时间</td><td>${KZ.formatDatetime(currentProposal.submitted_date)}</td></tr>
        ${currentProposal.production_line ? `<tr><td style="color:#999;">产线</td><td>${currentProposal.production_line}</td></tr>` : ""}
        ${currentProposal.equipment ? `<tr><td style="color:#999;">设备</td><td>${currentProposal.equipment}</td></tr>` : ""}
      </table>
      <div style="margin-top:10px;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">待改善现象</div>
        <div style="font-size:14px;line-height:1.6;">${currentProposal.phenomenon_description || ""}</div>
      </div>
      ${currentProposal.suggestion_description ? `
      <div style="margin-top:10px;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">建议方案</div>
        <div style="font-size:14px;line-height:1.6;">${currentProposal.suggestion_description}</div>
      </div>` : ""}
    `;

    renderDepts();
  });
}

function selectOption(btn) {
  const field = btn.dataset.field;
  document.querySelectorAll(`[data-field="${field}"]`).forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  reviewValues[field] = btn.dataset.value;
}

function loadUsers() {
  frappe.call({ method: "frappe.client.get_list",
    args: { doctype: "User", fields: ["name", "full_name"], filters: { enabled: 1 }, limit: 200 }
  }).then(r => {
    const sel = document.getElementById("project_leader");
    (r.message || []).forEach(u => {
      sel.innerHTML += `<option value="${u.name}">${u.full_name || u.name}</option>`;
    });
  });
}

function addDept() {
  departments.push({ department: "", responsible_person: "", role_description: "" });
  renderDepts();
}

function renderDepts() {
  const el = document.getElementById("dept-list");
  el.innerHTML = departments.map((d, i) => `
    <div class="dept-row">
      <select class="kz-select" onchange="departments[${i}].department=this.value" style="font-size:13px;">
        <option value="">选择部门</option>
        ${window._depts ? window._depts.map(dep => `<option value="${dep.name}" ${d.department===dep.name?"selected":""}>${dep.name}</option>`).join("") : ""}
      </select>
      <select class="kz-select" onchange="departments[${i}].responsible_person=this.value" style="font-size:13px;">
        <option value="">负责人</option>
        ${window._users ? window._users.map(u => `<option value="${u.name}" ${d.responsible_person===u.name?"selected":""}>${u.full_name||u.name}</option>`).join("") : ""}
      </select>
      <button onclick="departments.splice(${i},1);renderDepts();" style="background:none;border:none;color:#ff4d4f;font-size:18px;cursor:pointer;">✕</button>
    </div>
  `).join("");
}

// 加载部门列表
frappe.call({ method: "frappe.client.get_list",
  args: { doctype: "Department", fields: ["name"], limit: 100 }
}).then(r => { window._depts = r.message || []; });

frappe.call({ method: "frappe.client.get_list",
  args: { doctype: "User", fields: ["name", "full_name"], filters: { enabled: 1 }, limit: 200 }
}).then(r => { window._users = r.message || []; });

function approveProposal() {
  if (!reviewValues.urgency || !reviewValues.economic_impact || !reviewValues.quality_impact) {
    KZ.toast("请完成所有评估维度", "error"); return;
  }

  const data = {
    proposal_name: currentProposal.name,
    urgency: reviewValues.urgency,
    economic_impact: reviewValues.economic_impact,
    quality_impact: reviewValues.quality_impact,
    improvement_goal: document.getElementById("improvement_goal").value,
    project_leader: document.getElementById("project_leader").value,
    expected_completion_date: document.getElementById("expected_completion_date").value,
    departments: departments
  };

  KZ.api("kaizen.api.kaizen_api.approve_proposal", { data: JSON.stringify(data) })
    .then(result => {
      KZ.toast(`立项成功！项目编号：${result.project_name}`, "success");
      setTimeout(showList, 1500);
    });
}

function rejectProposal() {
  const reason = prompt("请输入拒绝原因：");
  if (!reason) return;
  KZ.api("kaizen.api.kaizen_api.reject_proposal", {
    proposal_name: currentProposal.name, reason: reason
  }).then(() => {
    KZ.toast("已拒绝提案", "success");
    setTimeout(showList, 1200);
  });
}
</script>
{% endblock %}
